apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: job-runner
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/tejas261/go-job-runner-gitops.git
    targetRevision: HEAD
    path: charts/job-runner
  destination:
    server: https://kubernetes.default.svc
    namespace: job-runner
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
